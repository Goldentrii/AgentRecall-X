    async function handleDreamStale(dreamIdx, candidateIdx, action) {
      var el = document.getElementById('dream-stale-' + dreamIdx + '-' + candidateIdx);
      if (!el) return;
      // Disable buttons immediately
      var buttons = el.querySelectorAll('button');
      buttons.forEach(function(b) { b.disabled = true; });

      if (action === 'accept') {
        // Extract insight title from data attribute (set during render)
        var titleSpan = el.querySelector('span[data-insight-title]');
        var candidateText = titleSpan ? titleSpan.getAttribute('data-insight-title').trim() : el.querySelector('span').textContent.trim();
        var searchText = candidateText.replace(/`/g, '').substring(0, 60);
        try {
          var { data } = await sb.from('ar_awareness')
            .select('id, title').eq('is_active', true)
            .ilike('title', '%' + searchText.substring(0, 40) + '%').limit(1);
          if (data && data.length > 0) {
            await backupBeforeAction('ar_awareness', data[0].id);
            await sb.from('ar_awareness').update({ is_active: false }).eq('id', data[0].id);
            el.style.borderColor = 'var(--accent-green)';
            el.style.opacity = '0.5';
            showToast('Stale insight archived: ' + data[0].title.substring(0, 50) + '...', 'success');
          } else {
            el.style.borderColor = 'var(--accent-copper)';
            showToast('Insight not found in awareness — may already be archived', 'error');
            buttons.forEach(function(b) { b.disabled = false; });
          }
        } catch (err) {
          console.warn('Could not archive matching insight:', err);
          showToast('Error archiving: ' + (err.message || String(err)), 'error');
          buttons.forEach(function(b) { b.disabled = false; });
        }
      } else {
        el.style.borderColor = 'var(--accent-red)';
        el.style.opacity = '0.3';
        showToast('Candidate rejected', 'success');
      }
    }

    // ========== Tab 7: Performance ==========
    async function loadTabPerformance(slug) {
      var contentEl = document.getElementById('tab-content');
      if (!contentEl || currentTab !== 'performance') return;

      try {
        var { data, error } = await sb.from('ar_corrections')
          .select('id, correction_date, severity, rule, context, dismissed, created_at').eq('project', slug)
          .order('correction_date', { ascending: true });

        if (error) throw error;
        var corrections = data || [];

        if (corrections.length === 0) {
          contentEl.innerHTML = '<div class="panel"><div class="brief-empty" style="text-align:center;padding:40px 20px;font-style:normal;">No corrections recorded yet &mdash; this is either very good or very new &#x1F937;</div></div>';
          return;
        }

        // Group by date
        var byDate = {};
        var p0Count = 0;
        corrections.forEach(function(c) {
          var date = c.correction_date ? c.correction_date.substring(0, 10) : 'unknown';
          if (!byDate[date]) byDate[date] = 0;
          byDate[date]++;
          if ((c.severity || '').toLowerCase() === 'p0') p0Count++;
        });

        // Get last 30 days
        var today = new Date();
        var days = [];
        for (var i = 29; i >= 0; i--) {
          var d = new Date(today);
          d.setDate(d.getDate() - i);
          var key = formatDate(d);
          days.push({ date: key, count: byDate[key] || 0 });
        }

        var maxCount = Math.max.apply(null, days.map(function(d) { return d.count; }));
        if (maxCount === 0) maxCount = 1;
        var avgCount = days.reduce(function(sum, d) { return sum + d.count; }, 0) / days.length;

        // Build SVG chart
        var chartWidth = 800;
        var chartHeight = 160;
        var barWidth = Math.floor((chartWidth - 40) / 30) - 2;
        var xOffset = 30;

        var svg = '<svg viewBox="0 0 ' + chartWidth + ' ' + (chartHeight + 30) + '" xmlns="http://www.w3.org/2000/svg">';

        // Y-axis line
        svg += '<line x1="' + (xOffset - 2) + '" y1="10" x2="' + (xOffset - 2) + '" y2="' + chartHeight + '" stroke="var(--border)" stroke-width="1"/>';
        // X-axis line
        svg += '<line x1="' + (xOffset - 2) + '" y1="' + chartHeight + '" x2="' + chartWidth + '" y2="' + chartHeight + '" stroke="var(--border)" stroke-width="1"/>';

        // Average line
        var avgY = chartHeight - (avgCount / maxCount) * (chartHeight - 20);
        svg += '<line x1="' + xOffset + '" y1="' + avgY + '" x2="' + chartWidth + '" y2="' + avgY + '" stroke="var(--text-muted)" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>';
        svg += '<text x="' + (xOffset + 2) + '" y="' + (avgY - 4) + '" fill="var(--text-muted)" font-size="10" font-family="Nunito, sans-serif">avg</text>';

        // Bars
        days.forEach(function(day, idx) {
          var barHeight = (day.count / maxCount) * (chartHeight - 20);
          if (day.count > 0 && barHeight < 4) barHeight = 4;
          var x = xOffset + idx * (barWidth + 2);
          var y = chartHeight - barHeight;
          var color = day.count > avgCount ? 'var(--accent-copper)' : 'var(--accent-green)';

          if (day.count > 0) {
            svg += '<rect x="' + x + '" y="' + y + '" width="' + barWidth + '" height="' + barHeight + '" rx="2" fill="' + color + '" opacity="0.8">';
            svg += '<title>' + day.date + ': ' + day.count + ' corrections</title>';
            svg += '</rect>';
          }

          // X-axis labels (every 5th day)
          if (idx % 5 === 0) {
            svg += '<text x="' + (x + barWidth / 2) + '" y="' + (chartHeight + 14) + '" fill="var(--text-muted)" font-size="9" font-family="Nunito, sans-serif" text-anchor="middle">' + day.date.substring(5) + '</text>';
          }
        });

        svg += '</svg>';

        // Stats
        var uniqueDates = Object.keys(byDate).length;
        var avgPerSession = uniqueDates > 0 ? (corrections.length / uniqueDates).toFixed(1) : '0';
        var p0Rate = corrections.length > 0 ? Math.round((p0Count / corrections.length) * 100) : 0;

        // Trend: last 7 vs previous 7
        var last7 = days.slice(-7).reduce(function(s, d) { return s + d.count; }, 0) / 7;
        var prev7 = days.slice(-14, -7).reduce(function(s, d) { return s + d.count; }, 0) / 7;
        var trendText, trendColor;
        if (last7 < prev7 * 0.85) {
          trendText = '\u2198 declining (good)';
          trendColor = 'var(--accent-green)';
        } else if (last7 > prev7 * 1.15) {
          trendText = '\u2197 rising (warning)';
          trendColor = 'var(--accent-red)';
        } else {
          trendText = '\u2192 stable';
          trendColor = 'var(--text-secondary)';
        }

        var html = '';

        // Chart
        html += '<div class="perf-chart-container">';
        html += '<div class="panel-title" style="margin-bottom:12px">' + t('Corrections 30d') + '</div>';
        html += svg;
        html += '</div>';

        // Stats
        html += '<div class="perf-stats">';
        html += '<div class="perf-stat"><div class="perf-stat-value">' + avgPerSession + '</div><div class="perf-stat-label">' + t('Avg corrections') + '</div></div>';
        html += '<div class="perf-stat"><div class="perf-stat-value">' + p0Rate + '%</div><div class="perf-stat-label">' + t('P0 rate') + '</div></div>';
        html += '<div class="perf-stat"><div class="perf-stat-value" style="color:' + trendColor + '">' + trendText + '</div><div class="perf-stat-label">' + t('7-day trend') + '</div></div>';
        html += '</div>';

        contentEl.innerHTML = html;

        // Append heatmap panel below the chart
        var heatPanel = document.createElement('div');
        heatPanel.className = 'panel';
        heatPanel.style.marginTop = '16px';
        contentEl.appendChild(heatPanel);
        loadSessionHeatmap(slug, heatPanel);

        // Corrections list (all corrections, clickable to expand)
        var allCorrs = corrections.slice().reverse(); // newest first
        var corrPanel = document.createElement('div');
        corrPanel.className = 'panel';
        corrPanel.style.marginTop = '16px';

        var corrHtml = '<div class="panel-title" style="margin-bottom:12px">📋 ' +
          t('All Corrections') + ' <span style="font-weight:400;color:var(--text-muted);font-size:13px">(' + allCorrs.length + ' total — click to expand)</span></div>';
        corrHtml += '<div class="corr-list" id="corr-list-' + escapeHtml(slug) + '">';

        allCorrs.forEach(function(c, idx) {
          var sevRaw = (c.severity || 'p1').toLowerCase();
          var sevClass = sevRaw === 'p0' ? 'corr-sev-p0' : sevRaw === 'p1' ? 'corr-sev-p1' : 'corr-sev-p2';
          var sevLabel = sevRaw.toUpperCase();
          var date = c.correction_date || (c.created_at ? c.created_at.substring(0, 10) : '');
          var body = (c.rule || c.context || '').trim();
          var preview = body.length > 110 ? body.substring(0, 110) + '…' : body;
          var hasFull = body.length > 110;

          corrHtml += '<div class="corr-item" id="ci-' + idx + '" onclick="toggleCorrItem(this)">';
          corrHtml += '<div class="corr-item-header">';
          corrHtml += '<span class="corr-sev ' + sevClass + '">' + escapeHtml(sevLabel) + '</span>';
          corrHtml += '<span class="corr-date">' + escapeHtml(date) + '</span>';
          if (hasFull) corrHtml += '<span class="corr-toggle-hint">↕ expand</span>';
          corrHtml += '<button class="learn-row-btn" style="margin-left:auto" title="Learn from this" onclick="event.stopPropagation();showLearnModal(' + JSON.stringify(c.id) + ',' + JSON.stringify(slug) + ',' + JSON.stringify(c.rule || c.context || '') + ',' + JSON.stringify(c.context || '') + ')">🎓 Learn</button>';
          corrHtml += '</div>';
          corrHtml += '<div class="corr-preview">' + escapeHtml(preview) + '</div>';
          if (hasFull) corrHtml += '<div class="corr-full">' + escapeHtml(body) + '</div>';
          corrHtml += '</div>';
        });

        corrHtml += '</div>';
        corrPanel.innerHTML = corrHtml;
        contentEl.appendChild(corrPanel);

      } catch (err) {
        console.error('Performance tab error:', err);
        contentEl.innerHTML = '<div class="brief-empty">Failed to load performance: ' + escapeHtml(err.message || String(err)) + '</div>';
      }
    }

    // ========== Supabase Realtime ==========
    let realtimeDebounceTimer = null;

    function setupRealtimeSubscription() {
      try {
        const channel = sb.channel('dashboard-live')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'ar_awareness' }, handleRealtimeChange)
          .on('postgres_changes', { event: '*', schema: 'public', table: 'ar_corrections' }, handleRealtimeChange)
          .on('postgres_changes', { event: '*', schema: 'public', table: 'ar_palace_rooms' }, handleRealtimeChange)
          .on('postgres_changes', { event: '*', schema: 'public', table: 'ar_sessions' }, handleRealtimeChange)
          .on('postgres_changes', { event: '*', schema: 'public', table: 'journal_entries' }, handleRealtimeChange)
          .on('postgres_changes', { event: '*', schema: 'public', table: 'projects' }, handleRealtimeChange)
          .subscribe(function(status) {
            var liveDot = document.querySelector('.live-dot');
            if (status === 'SUBSCRIBED') {
              if (liveDot) liveDot.style.background = 'var(--accent-green)';
              console.log('Realtime: subscribed to dashboard-live');
            } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
              if (liveDot) liveDot.style.background = 'var(--accent-red)';
              console.warn('Realtime: connection issue:', status);
            }
          });
      } catch (err) {
        console.warn('Realtime subscription failed:', err);
      }
    }

    function handleRealtimeChange(payload) {
      var table = payload.table;
      var event = payload.eventType; // INSERT, UPDATE, DELETE
      var tableName = table.replace('ar_', '').replace('_', ' ');

      // Show toast for changes
      if (event === 'INSERT') {
        showToast('New ' + tableName + ' entry added', 'info');
      } else if (event === 'DELETE') {
        showToast(tableName + ' entry removed', 'info');
      }

      // Invalidate tower cache so next render fetches fresh data
      towerDataCache = null;

      // Debounce re-render to avoid rapid-fire updates
      if (realtimeDebounceTimer) clearTimeout(realtimeDebounceTimer);
      realtimeDebounceTimer = setTimeout(function() {
        if (currentView === 'morning') {
          loadMorningBrief();
        } else if (currentView === 'tower') {
          loadControlTower();
        } else if (currentView === 'detail' && currentProject) {
          // Invalidate tab cache and reload current tab
          drillDownTabCache = {};
          loadDrillDown(currentProject);
        }
      }, 500);
    }

    // ========== Lightweight Markdown Renderer ==========
    function renderMarkdownLite(text) {
      if (!text) return '<em style="color:var(--text-muted)">Empty room</em>';
      var lines = text.split('\n');
      var out = [];
      var inList = false;
      lines.forEach(function(line) {
        var l = line;
        // Headings
        if (/^### /.test(l)) { if (inList) { out.push('</ul>'); inList = false; } out.push('<h4 style="margin:10px 0 4px;font-size:13px;color:var(--text-primary)">' + escapeHtml(l.slice(4)) + '</h4>'); return; }
        if (/^## /.test(l))  { if (inList) { out.push('</ul>'); inList = false; } out.push('<h3 style="margin:12px 0 5px;font-size:14px;color:var(--text-primary);font-weight:700">' + escapeHtml(l.slice(3)) + '</h3>'); return; }
        if (/^# /.test(l))   { if (inList) { out.push('</ul>'); inList = false; } out.push('<h2 style="margin:14px 0 6px;font-size:15px;color:var(--text-primary);font-weight:800">' + escapeHtml(l.slice(2)) + '</h2>'); return; }
        // Blockquote
        if (/^> /.test(l)) { if (inList) { out.push('</ul>'); inList = false; } out.push('<blockquote style="border-left:3px solid var(--accent-primary);margin:4px 0;padding:3px 10px;color:var(--text-muted);font-style:italic;font-size:12px">' + escapeHtml(l.slice(2)) + '</blockquote>'); return; }
        // Bullet list
        if (/^[-*] /.test(l)) { if (!inList) { out.push('<ul style="margin:4px 0;padding-left:16px">'); inList = true; } out.push('<li style="font-size:13px;margin:2px 0">' + inlineMarkdown(l.slice(2)) + '</li>'); return; }
        // Horizontal rule
        if (/^---+$/.test(l.trim())) { if (inList) { out.push('</ul>'); inList = false; } out.push('<hr style="border:none;border-top:1px solid var(--border);margin:8px 0">'); return; }
        // Empty line
        if (l.trim() === '') { if (inList) { out.push('</ul>'); inList = false; } out.push('<div style="height:6px"></div>'); return; }
        // Normal paragraph
        if (inList) { out.push('</ul>'); inList = false; }
        out.push('<p style="margin:3px 0;font-size:13px;line-height:1.55">' + inlineMarkdown(l) + '</p>');
      });
      if (inList) out.push('</ul>');
      return out.join('');
    }

    function inlineMarkdown(text) {
      return escapeHtml(text)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`(.+?)`/g, '<code style="background:var(--bg-secondary);padding:1px 4px;border-radius:3px;font-size:11px">$1</code>');
    }

    // ========== Feature 1: ⌘K Command Palette ==========
    var _palSelIdx = 0;
    var _palItems = [];

    function openPalette() {
      var pal = document.getElementById('cmd-palette');
      pal.style.display = 'block';
      var inp = document.getElementById('palette-input');
      inp.value = '';
      _palSelIdx = 0;

    function closePalette() {
      document.getElementById('cmd-palette').style.display = 'none';
      _palSelIdx = 0;
    }

    function _palBuildItems(q) {
      var lq = (q || '').toLowerCase().trim();
      var out = [];

      var actions = [
        { icon: '🌅', title: t('Morning Brief'),           sub: 'Switch view',        fn: function() { showMorningBrief(); closePalette(); } },
        { icon: '🗼', title: t('Control Tower'),           sub: 'Switch view',        fn: function() { showControlTower(); closePalette(); } },
        { icon: '🔄', title: 'Refresh Control Tower',      sub: 'Force reload data',  fn: function() { towerDataCache = null; showControlTower(); closePalette(); } },
        { icon: '🌙', title: 'Toggle theme',               sub: 'Light ↔ Dark',       fn: function() { toggleTheme(); closePalette(); } },
        { icon: '🌐', title: 'Toggle language · 切换语言', sub: 'EN ↔ 中文',          fn: function() { toggleLang(); closePalette(); } },
      ];

      var matchedActions = lq
        ? actions.filter(function(a) { return a.title.toLowerCase().includes(lq) || a.sub.toLowerCase().includes(lq); })
        : actions;

      var projs = allProjects || [];
      var matchedProjs = lq
        ? projs.filter(function(p) { return (p.name || p.slug).toLowerCase().includes(lq) || p.slug.toLowerCase().includes(lq); })
        : projs;

      if (lq && matchedProjs.length) {
        out.push({ type: 's', label: t('Projects') });
        matchedProjs.slice(0, 7).forEach(function(p) { out.push({ type: 'p', p: p }); });
      }
      if (matchedActions.length) {
        out.push({ type: 's', label: 'Actions' });
        matchedActions.forEach(function(a) { out.push({ type: 'a', a: a }); });
      }
      if (!lq && matchedProjs.length) {
        out.push({ type: 's', label: t('Projects') });
        matchedProjs.slice(0, 8).forEach(function(p) { out.push({ type: 'p', p: p }); });
      }
      return out;
    }

    function renderPaletteResults() {
      var q = document.getElementById('palette-input').value;
      var raw = _palBuildItems(q);
      _palItems = raw.filter(function(i) { return i.type !== 's'; });
      _palSelIdx = Math.min(_palSelIdx, Math.max(0, _palItems.length - 1));

      var container = document.getElementById('palette-results');
      if (!_palItems.length) {
        container.innerHTML = '<div class="pal-empty">No results for &ldquo;' + escapeHtml(q) + '&rdquo;</div>';
        return;
      }

      var aIdx = 0;
      container.innerHTML = raw.map(function(item) {
        if (item.type === 's') return '<div class="pal-section">' + escapeHtml(item.label) + '</div>';
        var idx = aIdx++;
        var sel = idx === _palSelIdx ? ' pal-sel' : '';
        if (item.type === 'p') {
          var p = item.p;
          var st = (p.status || 'active').toLowerCase();
          var stIcon = st.includes('blocked') ? '🚧' : st.includes('paused') ? '⏸' : st.includes('archived') ? '📦' : '●';
          var stColor = st.includes('blocked') ? 'var(--accent-red)' : st.includes('paused') ? 'var(--text-muted)' : 'var(--accent-green)';
          return '<div class="pal-item' + sel + '" data-pidx="' + idx + '" onclick="_palRun(' + idx + ')">' +
            '<div class="pal-icon">🧠</div>' +
            '<div class="pal-content">' +
              '<div class="pal-title">' + escapeHtml(p.name || p.slug) + '</div>' +
              '<div class="pal-sub"><span style="color:' + stColor + '">' + stIcon + '</span> ' + escapeHtml(st) + ' · ' + escapeHtml(p.slug) + '</div>' +
            '</div></div>';
        }
        var a = item.a;
        return '<div class="pal-item' + sel + '" data-pidx="' + idx + '" onclick="_palRun(' + idx + ')">' +
          '<div class="pal-icon">' + a.icon + '</div>' +
          '<div class="pal-content">' +
            '<div class="pal-title">' + escapeHtml(a.title) + '</div>' +
            '<div class="pal-sub">' + escapeHtml(a.sub) + '</div>' +
          '</div></div>';
      }).join('');

      var selEl = container.querySelector('.pal-sel');
      if (selEl) selEl.scrollIntoView({ block: 'nearest' });
    }

    function _palRun(idx) {
      var item = _palItems[idx];
      if (!item) return;
      if (item.type === 'p') { showDrillDown(item.p.slug); closePalette(); }
      else if (item.type === 'a' && item.a.fn) { item.a.fn(); }
    }

    function handlePaletteKey(e) {
      if (e.key === 'Escape') { closePalette(); return; }
      if (e.key === 'ArrowDown') { _palSelIdx = Math.min(_palSelIdx + 1, _palItems.length - 1); renderPaletteResults(); e.preventDefault(); return; }
      if (e.key === 'ArrowUp')   { _palSelIdx = Math.max(_palSelIdx - 1, 0); renderPaletteResults(); e.preventDefault(); return; }
      if (e.key === 'Enter') { _palRun(_palSelIdx); return; }
      _palSelIdx = 0;
    }

    document.addEventListener('keydown', function(e) {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        var pal = document.getElementById('cmd-palette');
        if (pal && pal.style.display !== 'none') closePalette();
        else openPalette();
      }
    });

    // ========== Feature 2: Copy Context for Claude ==========
    async function copyContextForClaude(slug) {
      showToast('Building context…', 'info');
      try {
        var proj = (allProjects || []).find(function(p) { return p.slug === slug; }) || {};
        var [journalRes, insightsRes, corrsRes] = await Promise.all([
          sb.from('journal_entries').select('entry_date, title, content, summary').contains('project_slugs', [slug]).order('entry_date', { ascending: false }).limit(3),
          sb.from('ar_awareness').select('title, evidence, confirmations, trend, source_project').eq('is_active', true).or('source_project.eq.' + slug + ',source_project.eq._global').order('confirmations', { ascending: false }).limit(4),
          sb.from('ar_corrections').select('rule, context, severity, created_at').eq('project', slug).eq('dismissed', false).order('created_at', { ascending: false }).limit(5)
        ]);

        var journals  = journalRes.data  || [];
        var insights  = insightsRes.data || [];
        var corrs     = corrsRes.data    || [];

        var lines = [
          '# ' + (proj.name || slug) + ' — AgentRecall Context',
          '> Snapshot: ' + new Date().toLocaleString(),
          '',
          '## Project',
          '- **Slug:** ' + slug,
          '- **Status:** ' + (proj.status || 'active'),
        ];
        if (proj.current_version) lines.push('- **Version:** v' + proj.current_version);
        if (proj.trajectory)      lines.push('- **Trajectory:** ' + proj.trajectory);
        if (proj.next_action)     lines.push('- **Next:** ' + proj.next_action);
        lines.push('');

        if (journals.length) {
          lines.push('## Recent Journal');
          journals.forEach(function(j) {
            lines.push('### ' + (j.entry_date || j.title || 'Entry'));
            var body = (j.summary || j.content || '').substring(0, 600).trim();
            if (body) lines.push(body);
            lines.push('');
          });
        }

        if (insights.length) {
          lines.push('## Key Insights');
          insights.forEach(function(ins) {
            lines.push('- **' + (ins.title || 'Insight') + '** (×' + (ins.confirmations || 0) + ')');
            if (ins.evidence) lines.push('  > ' + ins.evidence.substring(0, 220).replace(/\n/g, ' '));
          });
          lines.push('');
        }

        if (corrs.length) {
          lines.push('## Corrections / Watch Outs');
          corrs.forEach(function(c) {
            var text = (c.rule || c.context || '').substring(0, 200).replace(/\n/g, ' ').trim();
            if (text) lines.push('- [' + (c.severity || 'P1') + '] ' + text);
          });
          lines.push('');
        }

        await navigator.clipboard.writeText(lines.join('\n'));
        showToast('✓ Context copied — paste into Claude', 'success');
      } catch (err) {
        console.error('Copy context error:', err);
        showToast('Failed: ' + (err.message || String(err)), 'error');
      }
    }

    // ========== Feature 3: Memory Health Score ==========
    function calcHealthScore(p, sessionCounts30d, corrCountsPerProject) {
      var sessions    = Math.min(sessionCounts30d[p.slug]     || 0, 5);
      var corrections = Math.min(corrCountsPerProject[p.slug] || 0, 20);
      var daysSince   = p.updated_at ? (Date.now() - new Date(p.updated_at).getTime()) / 86400000 : 999;
      var recency     = daysSince < 7 ? 20 : daysSince < 14 ? 12 : daysSince < 30 ? 4 : daysSince < 60 ? -5 : -12;
      return Math.max(0, Math.min(100, Math.round(55 + sessions * 5 - corrections * 3 + recency)));
    }

    function healthColor(score) {
      if (score >= 80) return '#4A7C59';
      if (score >= 60) return '#7AAB5C';
      if (score >= 40) return '#C4841D';
      return '#DC2626';
    }

    // ========== Feature 4: Session Heatmap ==========
    async function loadSessionHeatmap(slug, container) {
      container.innerHTML = '<div class="brief-empty" style="padding:20px">Loading activity…</div>';
      try {
        var yearAgo = new Date(Date.now() - 365 * 86400000).toISOString();
        var { data, error } = await sb.from('ar_sessions')
          .select('started_at').eq('project', slug)
          .gte('started_at', yearAgo).order('started_at', { ascending: true });
        if (error) throw error;

        var counts = {};
        (data || []).forEach(function(s) {
          if (!s.started_at) return;
          var d = s.started_at.substring(0, 10);
          counts[d] = (counts[d] || 0) + 1;
        });
        var totalSessions = Object.values(counts).reduce(function(a, b) { return a + b; }, 0);
        var maxCount = Math.max.apply(null, Object.values(counts).concat([1]));

        // Build 53-week grid aligned to Sunday
        var today = new Date(); today.setHours(0, 0, 0, 0);
        var gridEnd = new Date(today);
        gridEnd.setDate(gridEnd.getDate() + (6 - gridEnd.getDay()));
        var gridStart = new Date(gridEnd);
        gridStart.setDate(gridStart.getDate() - 52 * 7);
        gridStart.setDate(gridStart.getDate() - gridStart.getDay());

        var weeks = [];
        var cur = new Date(gridStart);
        while (cur <= gridEnd) {
          var week = [];
          for (var di = 0; di < 7; di++) {
            var key = cur.toISOString().substring(0, 10);
            week.push({ date: key, count: counts[key] || 0 });
            cur.setDate(cur.getDate() + 1);
          }
          weeks.push(week);
        }

        function heatColor(count) {
          if (count === 0) return 'var(--bg-secondary)';
          var f = Math.min(count / maxCount, 1);
          if (f < 0.25) return '#B8DDB0';
          if (f < 0.5)  return '#7ABF5C';
          if (f < 0.75) return '#4A7C59';
          return '#2D5A3D';
        }

        var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        var monthRow = '<div class="heatmap-month-row">';
        var lastM = -1;
        weeks.forEach(function(week) {
          var m = parseInt(week[0].date.substring(5, 7), 10) - 1;
          monthRow += '<div class="heatmap-month-lbl">' + (m !== lastM ? monthNames[m] : '') + '</div>';
          lastM = m;
        });
        monthRow += '</div>';

        var gridHtml = '<div class="heatmap-grid">';
        weeks.forEach(function(week) {
          gridHtml += '<div class="heatmap-col">';
          week.forEach(function(day) {
            gridHtml += '<div class="heatmap-cell" style="background:' + heatColor(day.count) + '" title="' + day.date + ': ' + day.count + ' session' + (day.count !== 1 ? 's' : '') + '"></div>';
          });
          gridHtml += '</div>';
        });
        gridHtml += '</div>';

        var legendColors = ['var(--bg-secondary)', '#B8DDB0', '#7ABF5C', '#4A7C59', '#2D5A3D'];
        var legend = '<div class="heatmap-legend"><span>' + totalSessions + ' sessions in the last year</span>' +
          '<span style="margin-left:auto">Less&nbsp;</span>' +
          legendColors.map(function(c) { return '<div class="heatmap-cell" style="background:' + c + ';display:inline-block;flex-shrink:0"></div>'; }).join('') +
          '<span>&nbsp;More</span></div>';

        container.innerHTML = '<div class="heatmap-outer">' + monthRow + gridHtml + '</div>' + legend;
      } catch (err) {
        container.innerHTML = '<div class="brief-empty">Failed to load activity: ' + escapeHtml(err.message || String(err)) + '</div>';
      }
    }

    // ========== Feature 5: Live Agent Indicator ==========
    var _liveAgentSlugs = new Set();
    var _liveAgentTimer = null;

    async function pollLiveAgents() {
      try {
        var res = await sb.from('ar_sessions').select('project').eq('status', 'running').limit(100);
        var slugs = new Set((res.data || []).map(function(s) { return s.project; }).filter(Boolean));
        _liveAgentSlugs = slugs;

        var el = document.getElementById('header-live');
        if (el) {
          el.innerHTML = slugs.size > 0
            ? '&nbsp;&middot;&nbsp;<span class="live-agent-dot"></span><span style="font-size:12px;font-weight:700;color:var(--accent-green)">' + slugs.size + ' running</span>'
            : '';
        }

        if (currentView === 'tower') {
          slugs.forEach(function(slug) {
            var safeId = slug.replace(/[^a-zA-Z0-9_-]/g, '-');
            var header = document.querySelector('#pw-' + safeId + ' .project-card .card-header');
            if (header && !header.querySelector('.live-agent-dot')) {
              var dot = document.createElement('span');
              dot.className = 'live-agent-dot';
              dot.title = 'Agent running now';
              header.insertBefore(dot, header.firstChild);
            }
          });
          document.querySelectorAll('.project-card .live-agent-dot').forEach(function(dot) {
            var pw = dot.closest('[id^="pw-"]');
            if (pw) {
              var sl = pw.id.replace('pw-', '');
              if (!slugs.has(sl)) dot.remove();
            }
          });
        }
      } catch (_) { /* silent */ }
    }

    function startLiveAgentPoll() {
      pollLiveAgents();
      if (_liveAgentTimer) clearInterval(_liveAgentTimer);
      _liveAgentTimer = setInterval(pollLiveAgents, 15000);
    }

    init();
  </script>

  <!-- ⌘K Command Palette -->
  <div id="cmd-palette">
    <div class="palette-backdrop" onclick="closePalette()"></div>
    <div class="palette-box" role="dialog" aria-modal="true" aria-label="Command palette">
      <input id="palette-input" type="text" autocomplete="off" spellcheck="false"
             placeholder="Search projects or run actions…"
             oninput="renderPaletteResults()" onkeydown="handlePaletteKey(event)">
      <div id="palette-results" role="listbox"></div>
      <div class="pal-footer">
        <span><kbd>↑↓</kbd> navigate</span>
        <span><kbd>↵</kbd> select</span>
        <span><kbd>esc</kbd> close</span>
        <span style="margin-left:auto;opacity:0.6">⌘K to toggle</span>
      </div>
    </div>
  </div>
